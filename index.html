<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>digster · a directory of small web experiments</title>
  <meta name="description" content="A directory of small web experiments — digster's live GitHub Pages projects: games, graphics, learning tools and experiments." />

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="digster · a directory of small web experiments" />
  <meta property="og:description" content="A directory of small web experiments — digster's live GitHub Pages projects." />
  <meta property="og:url" content="https://digster.github.io/" />

  <!-- Inline SVG favicon (a minimal black tile) — no external request -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23111'/%3E%3Ctext x='50' y='78' font-size='80' font-family='Helvetica,Arial,sans-serif' font-weight='bold' text-anchor='middle' fill='%23fff'%3Ed%3C/text%3E%3C/svg%3E" />

  <link rel="stylesheet" href="assets/style.css" />

  <!--
    No-flash theme boot: run before first paint so we never flash the wrong theme.
    Reads a saved preference, else falls back to the OS setting.
  -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* localStorage may be blocked — default markup stays 'light' */ }
    })();
  </script>
</head>
<body>
  <div class="page">
    <!-- ===== Masthead : wordmark on the left, meta panel on the right ===== -->
    <header class="masthead">
      <div class="masthead__brand">
        <h1 class="wordmark">digster</h1>
        <p class="wordmark__sub">Cogito, ergo sum</p>
      </div>

      <div class="masthead__panel">
        <div class="masthead__toprow">
          <a class="avatar-link" href="https://github.com/digster" target="_blank" rel="noopener" aria-label="digster on GitHub">
            <img
              class="avatar"
              src="https://avatars.githubusercontent.com/u/3542726?v=4"
              alt="digster's GitHub avatar"
              width="48"
              height="48"
              loading="eager"
              onerror="this.onerror=null;this.src=&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 112 112'%3E%3Crect width='112' height='112' rx='56' fill='%23111'/%3E%3Ctext x='56' y='78' font-size='58' text-anchor='middle' fill='white' font-family='Helvetica,Arial,sans-serif' font-weight='bold'%3Ed%3C/text%3E%3C/svg%3E&quot;"
            />
          </a>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
            <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
          </button>
        </div>

        <p class="index-label">
          Project Index <span id="index-count" class="index-label__count">/ 00</span>
        </p>

        <div class="search">
          <span class="search__icon" aria-hidden="true">🔍</span>
          <input
            id="search"
            class="search__input"
            type="search"
            placeholder="Search projects"
            aria-label="Search projects"
            autocomplete="off"
          />
        </div>
      </div>
    </header>

    <main class="container">
      <!-- Slim bar that only appears while a tag filter is active -->
      <p id="active-filter" class="active-filter" hidden>
        Filtering by <span id="active-filter-tag" class="tag tag--active"></span>
        <button id="clear-filter" class="clear-filter" type="button">clear ✕</button>
      </p>

      <!-- Entries are injected here by app.js from data/sites.json -->
      <section id="grid" class="grid" aria-label="Projects" aria-busy="true"></section>

      <!-- Empty state, shown when a search matches nothing -->
      <p id="empty" class="empty" hidden>
        <span class="empty__emoji" aria-hidden="true">🫥</span>
        Nothing matches that — try another word.
      </p>
    </main>

    <footer class="footer">
      <p class="footer__note">Built with ❤️</p>
      <p class="footer__link">
        <a href="https://github.com/digster/digster.github.io" target="_blank" rel="noopener">View the source <span aria-hidden="true">↗</span></a>
      </p>
    </footer>
  </div>

  <script src="assets/app.js" defer></script>
</body>
</html>
