<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>digster · a little gallery of my GitHub sites</title>
  <meta name="description" content="A colorful little hub for digster's live GitHub Pages projects — games, graphics, learning tools and experiments." />

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="digster · GitHub sites" />
  <meta property="og:description" content="A colorful little hub for digster's live GitHub Pages projects." />
  <meta property="og:url" content="https://digster.github.io/" />

  <!-- Inline SVG favicon (a playful gradient sparkle) — no external request -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />

  <link rel="stylesheet" href="assets/style.css" />

  <!--
    No-flash theme boot: run before first paint so we never flash the wrong theme.
    Reads a saved preference, else falls back to the OS setting.
  -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* localStorage may be blocked — default markup stays 'light' */ }
    })();
  </script>
</head>
<body>
  <!-- Decorative animated blobs sitting behind everything -->
  <div class="blobs" aria-hidden="true">
    <span class="blob blob--1"></span>
    <span class="blob blob--2"></span>
    <span class="blob blob--3"></span>
  </div>

  <header class="hero">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
      <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
    </button>

    <img
      class="hero__avatar"
      src="https://avatars.githubusercontent.com/u/3542726?v=4"
      alt="digster's GitHub avatar"
      width="112"
      height="112"
      loading="eager"
      onerror="this.onerror=null;this.src=&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 112 112'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff5d8f'/%3E%3Cstop offset='.5' stop-color='%236a7cff'/%3E%3Cstop offset='1' stop-color='%2335d0ba'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='112' height='112' rx='56' fill='url(%23g)'/%3E%3Ctext x='56' y='76' font-size='58' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3Ed%3C/text%3E%3C/svg%3E&quot;"
    />
    <h1 class="hero__title">digster</h1>
    <p class="hero__tagline">Small web experiments, learning tools &amp; graphics — all shipped as tiny static sites.</p>
    <a class="hero__link" href="https://github.com/digster" target="_blank" rel="noopener">
      <span aria-hidden="true">↗</span> github.com/digster
    </a>
  </header>

  <main class="container">
    <section class="controls" aria-label="Filter projects">
      <div class="search">
        <span class="search__icon" aria-hidden="true">🔍</span>
        <input
          id="search"
          class="search__input"
          type="search"
          placeholder="Search projects…"
          aria-label="Search projects"
          autocomplete="off"
        />
      </div>
      <p id="active-filter" class="active-filter" hidden>
        Filtering by <span id="active-filter-tag" class="tag tag--active"></span>
        <button id="clear-filter" class="clear-filter" type="button">clear ✕</button>
      </p>
    </section>

    <!-- Cards are injected here by app.js from data/sites.json -->
    <section id="grid" class="grid" aria-label="Projects" aria-busy="true"></section>

    <!-- Friendly empty state, shown when a search matches nothing -->
    <p id="empty" class="empty" hidden>
      <span class="empty__emoji" aria-hidden="true">🫥</span>
      Nothing matches that — try another word.
    </p>
  </main>

  <footer class="footer">
    <p>
      Built by hand with plain HTML, CSS &amp; a sprinkle of JavaScript — no build step. ✨
    </p>
    <p>
      <a href="https://github.com/digster/digster.github.io" target="_blank" rel="noopener">View the source</a>
    </p>
  </footer>

  <script src="assets/app.js" defer></script>
</body>
</html>
